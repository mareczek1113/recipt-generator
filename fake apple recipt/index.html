<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      background: #fff;
      color: #1d1d1f;
      padding: 30px;
    }

    .container {
      max-width: 620px;
      margin: auto;
    }

    .generator-box {
      border: 1px solid #d2d2d7;
      border-radius: 16px;
      padding: 24px;
    }

    .generator-box h2 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .example {
      margin-top: 7px;
      font-size: 12px;
      color: #6e6e73;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0071e3;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0062c4;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="generator-box">

    <h2>Generate Test Order</h2>

    <div class="input-group">
      <label>Item Name</label>

      <input
        type="text"
        id="itemName"
        placeholder="AirPods Pro"
      >

      <div class="example">
        Example: AirPods Pro (2nd generation) with MagSafe Charging Case (USB-C)
      </div>
    </div>

    <div class="input-group">
      <label>Price (£)</label>

      <input
        type="number"
        id="price"
        placeholder="219"
      >
    </div>

    <div class="input-group">
      <label>Order Date</label>

      <input
        type="date"
        id="orderDate"
      >
    </div>

    <button onclick="generateOrder()">
      Generate Order
    </button>

  </div>

</div>

<script>

function generateOrder() {

  const itemName = document.getElementById("itemName").value;
  const price = document.getElementById("price").value;
  const orderDateInput = document.getElementById("orderDate").value;

  if (!itemName || !price || !orderDateInput) {
    alert("Please fill in all fields.");
    return;
  }

  const orderDate = new Date(orderDateInput);

  const shipment1 = new Date(orderDate);
  shipment1.setDate(shipment1.getDate() + 5);

  const shipment2Start = new Date(orderDate);
  shipment2Start.setDate(shipment2Start.getDate() + 5);

  const shipment2End = new Date(orderDate);
  shipment2End.setDate(shipment2End.getDate() + 7);

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  const longOptions = {
    month: "long",
    day: "numeric",
    year: "numeric"
  };

  const randomNumber =
    "W" + Math.floor(100000000 + Math.random() * 900000000);

  // OPEN NEW TAB
  const newTab = window.open("", "_blank");

  // PAGE TITLE
  newTab.document.title = "Thank you for your order.";

  // ADD GOOGLE FONT
  const font = newTab.document.createElement("link");
  font.rel = "stylesheet";
  font.href =
    "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap";

  newTab.document.head.appendChild(font);

  // STYLES
  const style = newTab.document.createElement("style");

  style.innerHTML = `

    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;
      background:#fff;
      color:#1d1d1f;
      font-size:15px;
      line-height:1.55;
      margin:0;
    }

    .email-wrapper{
      max-width:580px;
      margin:0 auto;
      padding:44px 32px 60px;
    }

    .title{
      font-size:30px;
      font-weight:300;
      margin-bottom:18px;
      line-height:1.2;
    }

    .subtitle{
      font-size:14px;
      margin-bottom:10px;
      line-height:1.6;
    }

    .order-meta{
      margin-top:30px;
      margin-bottom:6px;
    }

    .order-meta p{
      font-size:13px;
      margin-bottom:3px;
    }

    hr{
      border:none;
      border-top:1px solid #d2d2d7;
      margin:16px 0;
    }

    .items-grid{
      display:grid;
      grid-template-columns:148px 1fr;
      margin-top:26px;
    }

    .col-label{
      font-size:14px;
      font-weight:600;
    }

    .shipment-title{
      font-weight:600;
      font-size:13px;
      margin-bottom:3px;
    }

    .shipment-detail{
      font-size:13px;
      margin-bottom:2px;
    }

    .product-row{
      display:flex;
      gap:14px;
      margin-top:14px;
    }

    .product-img{
      width:58px;
      height:58px;
      object-fit:contain;
    }

    .product-info{
      flex:1;
    }

    .product-name{
      font-size:13px;
      font-weight:500;
    }

    .product-price{
      font-size:13px;
      margin-top:2px;
    }

    .product-qty-row{
      display:flex;
      justify-content:space-between;
      margin-top:4px;
      font-size:13px;
    }

    .shipment-2{
      margin-top:18px;
      padding-top:16px;
      border-top:1px solid #d2d2d7;
    }

  `;

  newTab.document.head.appendChild(style);

  // HTML CONTENT
  newTab.document.body.innerHTML = `

<div class="email-wrapper">

  <!-- LOGO TOP LEFT -->
  <div style="margin-bottom:38px;">
    <img src="logo.png" style="width:28px;height:28px;object-fit:contain;display:block;">
  </div>

  <h1 class="title">
    Thank you for your order.
  </h1>

  <p class="subtitle">
    We'll let you know when your items are on their way.
  </p>

  <p class="subtitle">
    Your delivery date reflects no-contact safeguards put in place to protect employees, delivery partners, and customers.
  </p>

  <div class="order-meta">

    <p>
      <strong>Order Number:</strong>
      ${randomNumber}
    </p>

    <p>
      <strong>Ordered on:</strong>
      ${orderDate.toLocaleDateString("en-GB", longOptions)}
    </p>

  </div>

  <hr>

  <div class="items-grid">

    <div class="col-label">
      Items to be<br>Shipped
    </div>

    <div>

      <div class="shipment-title">
        Shipment 1
      </div>

      <div class="shipment-detail">
        <strong>Ships:</strong> In Stock
      </div>

      <div class="shipment-detail">
        <strong>Delivers:</strong>
        ${shipment1.toLocaleDateString("en-GB", options)} by UPS
      </div>

      <hr>

      <div class="product-row">

        <img src="product.png" class="product-img">

        <div class="product-info">

          <div class="product-name">
            ${itemName}
          </div>

          <div class="product-price">
            £${parseFloat(price).toFixed(2)}
          </div>

          <div class="product-qty-row">
            <span>Qty 1</span>
            <strong>£${parseFloat(price).toFixed(2)}</strong>
          </div>

        </div>

      </div>

      <div class="shipment-2">

        <div class="shipment-title">
          Shipment 2
        </div>

        <div class="shipment-detail">
          <strong>Ships:</strong> 5–7 business days
        </div>

        <div class="shipment-detail">
          <strong>Delivers:</strong>
          ${shipment2Start.toLocaleDateString("en-GB", options)}
          –
          ${shipment2End.toLocaleDateString("en-GB", options)}
          by UPS
        </div>

      </div>

    </div>

  </div>

</div>

`;

}

</script>

</body>
</html>
